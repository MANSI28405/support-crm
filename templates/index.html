<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Support CRM Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{

            background:#eef2f7;

            padding:40px;

        }

        .container{

            max-width:1100px;

            margin:auto;

            background:white;

            padding:30px;

            border-radius:12px;

            box-shadow:0 5px 15px rgba(0,0,0,.12);

        }

        h1{

            text-align:center;

            color:#2563eb;

            margin-bottom:25px;

        }

        h2{

            margin-top:15px;

            margin-bottom:15px;

            color:#333;

        }

        input,
        textarea{

            width:100%;

            padding:10px;

            margin-top:8px;

            margin-bottom:14px;

            border-radius:6px;

            border:1px solid #ccc;

        }

        textarea{

            height:90px;

        }

        button{

            padding:10px 16px;

            border:none;

            border-radius:6px;

            cursor:pointer;

            background:#2563eb;

            color:white;

        }

        button:hover{

            opacity:.9;

        }

        button:disabled{

            background:#9ca3af;

            cursor:not-allowed;

        }

        .close-btn{

            background:green;

        }

        .delete-btn{

            background:red;

            margin-left:5px;

        }

        hr{

            margin:30px 0;

        }

        #searchBox{

            margin-top:15px;

            margin-bottom:15px;

        }

        .stats{

            font-weight:bold;

            margin-bottom:15px;

            color:#444;

        }

        table{

            width:100%;

            border-collapse:collapse;

        }

        th{

            background:#2563eb;

            color:white;

            padding:12px;

        }

        td{

            padding:12px;

            text-align:center;

            border-bottom:1px solid #ddd;

        }

        tr:nth-child(even){

            background:#f8fafc;

        }

        .status-open{

            background:green;

            color:white;

            padding:5px 12px;

            border-radius:20px;

        }

        .status-closed{

            background:gray;

            color:white;

            padding:5px 12px;

            border-radius:20px;

        }

        footer{

            margin-top:30px;

            text-align:center;

            color:gray;

        }

    </style>

</head>

<body>

<div class="container">

<h1>Support CRM Dashboard</h1>

<h2>Create Ticket</h2>

<form id="ticketForm">

<input
type="text"
id="customer_name"
placeholder="Customer Name"
required
>

<input
type="email"
id="email"
placeholder="Customer Email"
required
>

<input
type="text"
id="subject"
placeholder="Subject"
required
>

<textarea
id="description"
placeholder="Issue Description"
required
></textarea>

<button type="submit">

Create Ticket

</button>

</form>

<hr>

<h2>All Tickets</h2>

<button onclick="loadTickets()">

🔄 Refresh Tickets

</button>
<select id="statusFilter" onchange="loadTickets()">
    <option value="">All Status</option>
    <option value="Open">Open</option>
    <option value="Closed">Closed</option>
</select>

<input

id="searchBox"

type="text"

placeholder="Search by customer or subject..."

onkeyup="loadTickets()"

>

<div id="tickets"></div>

<footer>

Support CRM • FastAPI • SQLite

</footer>

</div>

<script>
document.getElementById("ticketForm").onsubmit = async function (e) {

    e.preventDefault();

    const form = new URLSearchParams();

    form.append(
        "customer_name",
        document.getElementById("customer_name").value
    );

    form.append(
        "email",
        document.getElementById("email").value
    );

    form.append(
        "subject",
        document.getElementById("subject").value
    );

    form.append(
        "description",
        document.getElementById("description").value
    );

    const response = await fetch(
        "/tickets",
        {
            method: "POST",
            body: form
        }
    );

    if (response.ok) {

        alert("✅ Ticket created successfully!");

        document
            .getElementById("ticketForm")
            .reset();

        loadTickets();

    } else {

        alert("❌ Failed to create ticket.");

    }

};



async function loadTickets() {

    const response = await fetch("/tickets");

    const data = await response.json();

    const keyword = document
        .getElementById("searchBox")
        .value
        .toLowerCase();
    const statusFilter = document
    .getElementById("statusFilter")
    .value;

    const filtered = data.filter(ticket => {

    const matchesSearch =
        ticket.customer_name.toLowerCase().includes(keyword) ||
        ticket.subject.toLowerCase().includes(keyword);

    const matchesStatus =
        statusFilter === "" ||
        ticket.status === statusFilter;

    return matchesSearch && matchesStatus;

});

    const total = filtered.length;

    const open = filtered.filter(

        t => t.status === "Open"

    ).length;

    const closed = total - open;

    let html = `

    <div class="stats">

        Total: ${total}

        |

        Open: ${open}

        |

        Closed: ${closed}

    </div>

    <table>

        <tr>

            <th>ID</th>

            <th>Name</th>

            <th>Email</th>

            <th>Subject</th>

            <th>Description</th>

            <th>Status</th>

            <th>Actions</th>

        </tr>

    `;
    filtered.forEach(ticket => {

        html += `

        <tr>

            <td>${ticket.id}</td>

            <td>${ticket.customer_name}</td>

            <td>${ticket.email}</td>

            <td>${ticket.subject}</td>

            <td>${ticket.description}</td>

            <td>

                <span class="${
                    ticket.status === "Open"
                        ? "status-open"
                        : "status-closed"
                }">

                    ${ticket.status}

                </span>

            </td>

            <td>
    <button onclick="viewTicket(${ticket.id})">
        View
    </button>

    ${ticket.status === "Open"
        ? `<button class="close-btn" onclick="closeTicket(${ticket.id})">Close</button>`
        : `<button disabled>Closed</button>`
    }

    <button
        class="delete-btn"
        onclick="deleteTicket(${ticket.id})"
    >
        Delete
    </button>
</td>


        </tr>

        `;

    });

    html += "</table>";

    document.getElementById("tickets").innerHTML = html;

}
async function closeTicket(id) {

    if (!confirm("Are you sure you want to close this ticket?")) {
        return;
    }

    await fetch(
        `/tickets/${id}?status=Closed`,
        {
            method: "PUT"
        }
    );

    alert("✅ Ticket closed successfully!");

    loadTickets();
}



async function deleteTicket(id) {

    if (!confirm("Are you sure you want to delete this ticket?")) {
        return;
    }

    await fetch(
        `/tickets/${id}`,
        {
            method: "DELETE"
        }
    );

    alert("🗑️ Ticket deleted successfully!");

    loadTickets();
}
async function viewTicket(id) {

    const response = await fetch("/tickets");

    const tickets = await response.json();

    const ticket = tickets.find(t => t.id === id);

    if (!ticket) {
        alert("Ticket not found.");
        return;
    }

    alert(
        "Ticket ID: " + ticket.id + "\n\n" +
        "Customer: " + ticket.customer_name + "\n" +
        "Email: " + ticket.email + "\n" +
        "Subject: " + ticket.subject + "\n" +
        "Description: " + ticket.description + "\n" +
        "Status: " + ticket.status
    );
}


loadTickets();

</script>

</body>

</html>
